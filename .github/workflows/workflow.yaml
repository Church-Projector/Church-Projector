name: Release Workflow

on:
  push:
    tags:
      - '*'

jobs:
  build:
    strategy:
      matrix:
        include:
        - platform: linux-x64
          os: ubuntu-latest
        - platform: linux-arm64
          os: ubuntu-24.04-arm
        - platform: win-x64
          os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build for ${{ matrix.platform }}
        run: |
          dotnet publish -c Release ./ChurchProjector/ChurchProjector/ChurchProjector.csproj --runtime ${{ matrix.platform }} --output ./publish/${{ matrix.platform }} /p:Version="${{ github.ref_type == 'tag' && github.ref_name || '0.0.1' }}" /p:InformationalVersion="${{ github.ref_type == 'tag' && github.ref_name || '0.0.1' }}" /p:FileVersion="${{ github.ref_type == 'tag' && github.ref_name || '0.0.1' }}"

      - name: Build PowerPoint worker (Windows only)
        if: matrix.platform == 'win-x64'
        run: |
          dotnet publish -c Release ./ChurchProjector/ChurchProjector.PowerPoint/ChurchProjector.PowerPoint.csproj --runtime ${{ matrix.platform }} --output ./publish/${{ matrix.platform }}/worker /p:Version="${{ github.ref_type == 'tag' && github.ref_name || '0.0.1' }}" /p:InformationalVersion="${{ github.ref_type == 'tag' && github.ref_name || '0.0.1' }}" /p:FileVersion="${{ github.ref_type == 'tag' && github.ref_name || '0.0.1' }}"

      - name: Copy worker into main output (Windows only)
        if: matrix.platform == 'win-x64'
        shell: bash
        run: |
          mv ./publish/${{ matrix.platform }}/worker/* ./publish/${{ matrix.platform }}/

      - name: Cleanup
        shell: bash
        run: |
          find . -type f -path '*/win-x86/*' -delete
          find . -type f -path '*.pdb' -delete

      # Build the .deb package for Linux platforms only
      - name: Create .deb package for Linux
        if: startsWith(matrix.platform, 'linux')
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.0.1' }}
          RUNTIME: ${{ matrix.platform }}
        run: ./build/scripts/package.linux.sh

      - name: Zip ${{ matrix.platform }} artifact
        if: matrix.platform == 'win-x64'
        run: |
          Compress-Archive -Path "./publish/${{ matrix.platform }}/*" -DestinationPath "${{ matrix.platform }}.zip"

      # Upload the .deb package for Linux platforms
      - name: Upload .deb package artifact
        if: startsWith(matrix.platform, 'linux')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.platform }}.deb

      # Upload the zip artifact for non-Linux platforms (Windows)
      - name: 'Upload Artifact'
        if: matrix.platform == 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.platform }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
        
    needs: build

    steps: 
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - uses: ncipollo/release-action@v1
        with:
          artifacts: |
            ./artifacts/**/*.zip
            ./artifacts/**/*.deb